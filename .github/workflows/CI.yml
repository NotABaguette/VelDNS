name: CI

on:
  push:
    branches: ["tuunel_mask"]
  pull_request:
    branches: ["tunnel_mask"]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target:  x86_64-unknown-linux-gnu
            runner:  ubuntu-latest
            cross:   false
            archive: tar.gz

          - target:  x86_64-unknown-linux-musl
            runner:  ubuntu-latest
            cross:   true
            archive: tar.gz

          - target:  aarch64-unknown-linux-gnu
            runner:  ubuntu-latest
            cross:   true
            archive: tar.gz

          - target:  aarch64-unknown-linux-musl
            runner:  ubuntu-latest
            cross:   true
            archive: tar.gz

          - target:  armv7-unknown-linux-gnueabihf
            runner:  ubuntu-latest
            cross:   true
            archive: tar.gz

          - target:  armv7-unknown-linux-musleabihf
            runner:  ubuntu-latest
            cross:   true
            archive: tar.gz

          - target:  i686-unknown-linux-gnu
            runner:  ubuntu-latest
            cross:   true
            archive: tar.gz

          - target:  x86_64-apple-darwin
            runner:  macos-15-intel
            cross:   false
            archive: tar.gz

          - target:  aarch64-apple-darwin
            runner:  macos-latest
            cross:   false
            archive: tar.gz

          - target:  x86_64-pc-windows-msvc
            runner:  windows-latest
            cross:   false
            archive: zip
            ext:     .exe

          - target:  i686-pc-windows-msvc
            runner:  windows-latest
            cross:   false
            archive: zip
            ext:     .exe

          - target:  aarch64-pc-windows-msvc
            runner:  windows-latest
            cross:   false
            archive: zip
            ext:     .exe

          - target:  x86_64-unknown-freebsd
            runner:  ubuntu-latest
            cross:   true
            archive: tar.gz

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        if: matrix.cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # -----------------------------
      # Run tests (host platform)
      # -----------------------------
      - name: Run tests
        if: matrix.cross == false
        run: cargo test --all --verbose

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build (native)
        if: matrix.cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      # -----------------------------
      # Package artifacts
      # -----------------------------
      - name: Prepare artefact directory (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARTIFACT_DIR="veldns-${{ github.sha }}-${{ matrix.target }}"
          mkdir -p "$ARTIFACT_DIR"

          cp "target/${{ matrix.target }}/release/veldns" "$ARTIFACT_DIR/veldns"
          chmod +x "$ARTIFACT_DIR/veldns"

          cp README.md "$ARTIFACT_DIR/README.md" || true
          cp config.toml "$ARTIFACT_DIR/config.toml.example" || true
          cp static_records.csv "$ARTIFACT_DIR/static_records.csv.example" || true

          tar -czf "${ARTIFACT_DIR}.tar.gz" "$ARTIFACT_DIR"

          echo "ARTIFACT=${ARTIFACT_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Prepare artefact directory (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $dir = "veldns-${{ github.sha }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir

          Copy-Item "target\${{ matrix.target }}\release\veldns.exe" "$dir\veldns.exe"

          if (Test-Path README.md) { Copy-Item README.md "$dir\README.md" }
          if (Test-Path config.toml) { Copy-Item config.toml "$dir\config.toml.example" }
          if (Test-Path static_records.csv) { Copy-Item static_records.csv "$dir\static_records.csv.example" }

          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

          echo "ARTIFACT=$dir.zip" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      # -----------------------------
      # Upload artifacts
      # -----------------------------
      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: veldns-${{ matrix.target }}
          path: ${{ env.ARTIFACT }}
          retention-days: 7
