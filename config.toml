# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                       VelDNS  –  config.toml                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ── Server ────────────────────────────────────────────────────────────────────
[server]
bind = [
    "0.0.0.0:53",
    # "[::]:53",
]
workers = 0
max_udp_payload = 4096
tcp = true
recv_buf = 0
send_buf = 0


# ── Upstream / forwarding ─────────────────────────────────────────────────────
[upstream]
primary = [
    "8.8.8.8:53",
    "8.8.4.4:53",
]
fallback = [
    "1.1.1.1:53",
    "1.0.0.1:53",
    "9.9.9.9:53",
]
timeout_ms = 3000
retries = 2
parallel = true


# ── In-memory response cache ──────────────────────────────────────────────────
[cache]
enabled     = true
max_entries = 1_000_000
min_ttl = 30
max_ttl = 86400
negative_ttl = 300


# ── DNSSEC ────────────────────────────────────────────────────────────────────
[dnssec]
enabled = true
validate = false


# ── Static record overrides ────────────────────────────────────────────────────
[static_records]
file = "static_records.csv"
authoritative = true


# ── Logging ────────────────────────────────────────────────────────────────────
[logging]
level = "info"
log_queries = false


# ── Tunnel Mask ────────────────────────────────────────────────────────────────
# Disguise dnstt/slipstream tunnel queries by splitting them into multiple
# innocent-looking AAAA queries sent through a recursive resolver to a VelDNS
# server node acting as authoritative NS for the relay zone.
#
# Uncomment and configure below to enable.

# [tunnel_mask]
# enabled    = true
# mode       = "client"                     # "client" or "server"
# relay_zone = "relay.example.net"
# encoding   = "hex"                        # "hex" (recommended) or "syllable"
#
# # ── Client-only settings ──────────────────────────────────────────────────
# resolver         = ["8.8.8.8:53"]         # resolver to send masked queries through
# session_ttl_ms   = 5000                   # timeout waiting for final response
# max_qname_len    = 120                    # total QNAME length cap (stealth tuning)
# label_len        = 12                     # hex chars per label
# send_jitter_ms   = [3, 15]               # random delay (ms) between non-final fragments
#
# # ── Server-only settings ─────────────────────────────────────────────────
# upstream_addr        = "127.0.0.1:5353"   # real dnstt/slipstream server
# max_response_records = 10                 # AAAA records per response (stealth tuning)
# dummy_ttl            = 60                 # TTL for non-final (dummy) responses
# response_ttl         = 30                 # TTL for final (data) responses
#
# # ── Detection tuning (client only) ──────────────────────────────────────
# known_tunnel_zones        = ["t.tunnel.example.com"]
# auto_detect               = true
# qname_len_threshold       = 80
# label_len_threshold       = 30
# entropy_threshold         = 3.8
# base32_fraction_threshold = 0.85